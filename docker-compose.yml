# docker-compose.yml — Database services for Launch Run platform
# Run: docker compose up -d
#
# Services included:
#   PostgreSQL 16      (port 5432)  — primary relational store
#   Redis cache        (port 6379)  — general caching
#   Redis sessions     (port 6380)  — session storage
#   Redis pub/sub      (port 6381)  — pub/sub messaging
#   ClickHouse         (port 8123)  — analytics/event store
#   MongoDB 7          (port 27017) — document store
#   Neo4j 5            (port 7474)  — graph database
#   Elasticsearch 8    (port 9200)  — full-text search
#   Qdrant             (port 6333)  — vector database
#   TimescaleDB        (port 5433)  — time-series data
#   ScyllaDB 6         (port 9042)  — wide-column store

name: launch-run-databases

networks:
  databases:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  redis_sessions_data:
  redis_pubsub_data:
  clickhouse_data:
  mongodb_data:
  elasticsearch_data:
  neo4j_data:
  qdrant_data:
  timescaledb_data:
  scylladb_data:

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: launch-run
      POSTGRES_PASSWORD: launch-run
      POSTGRES_DB: launch-run
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launch-run -d launch-run"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ─── Redis (cache) ───────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - databases
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis (sessions) ────────────────────────────────────────────────────────
  redis-sessions:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_sessions_data:/data
    networks:
      - databases
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis (pub/sub) ─────────────────────────────────────────────────────────
  redis-pubsub:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    ports:
      - "6381:6379"
    volumes:
      - redis_pubsub_data:/data
    networks:
      - databases
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── ClickHouse ──────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24
    environment:
      CLICKHOUSE_DB: launch-run
      CLICKHOUSE_USER: launch-run
      CLICKHOUSE_PASSWORD: launch-run
    ports:
      - "8123:8123"
      - "9010:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./init-scripts/clickhouse/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user launch-run --password launch-run --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ─── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: launch-run
      MONGO_INITDB_ROOT_PASSWORD: launch-run
      MONGO_INITDB_DATABASE: launch-run
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./init-scripts/mongodb/init.js:/docker-entrypoint-initdb.d/01-init.js
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ─── Elasticsearch ───────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE 'green|yellow'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # ─── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/launch-runlaunch-run
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1g
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./init-scripts/neo4j/init.cypher:/docker-entrypoint-initdb.d/01-init.cypher
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Qdrant ──────────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── TimescaleDB ─────────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: launch-run
      POSTGRES_PASSWORD: launch-run
      POSTGRES_DB: launch_run_timeseries
    ports:
      - "5433:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init-scripts/timescaledb/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launch-run -d launch_run_timeseries"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── ScyllaDB ────────────────────────────────────────────────────────────────
  scylladb:
    image: scylladb/scylla:6.0
    command: --smp 2 --memory 1G --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9042:9042"
      - "9160:9160"
    volumes:
      - scylladb_data:/var/lib/scylla
      - ./init-scripts/scylladb/init.cql:/docker-entrypoint-initdb.d/01-init.cql
    networks:
      - databases
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' 2>&1 | grep -v Error"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
